name = "physical_two_10um_pulses_40um_separation"
mode = "physical_si"

[grid]
Nz = 128
Nd = 64
Nt = 128
Ny = 128

[scales]
# SI reference scales used to nondimensionalize the numerical problem.
z_m = 2.0e-3
time_s = 10.0e-6
y_m = 10.0e-6

[domain]
# TOML does not evaluate Julia expressions, so physical values are stored as
# plain SI numbers and identified by their key suffixes.
z_m = [0.0, 2.0e-3]
t_s = [0.0, 50.0e-6]
y_m = [-50.0e-6, 50.0e-6]

[model]
carrier_frequency_hz = 200.0e12
# Effective coefficient multiplying the coherence, in s^-1 m^-1. This already
# includes density, dipole moment and hbar. The solver uses a normalized uniform
# detuning distribution, so changing Nd does not change this coefficient.
# With the scales above it gives dimensionless alpha = 0.1.
coupling_hz_per_m = 5.0e6

[[pulses]]
time_center_s = 25.0e-6
time_width_s = 10.0e-6
time_area_rad = 1.0
y_center_m = -20.0e-6
y_width_m = 10.0e-6
y_area_m = 10.0e-6

[[pulses]]
time_center_s = 25.0e-6
time_width_s = 10.0e-6
time_area_rad = 1.0
y_center_m = 20.0e-6
y_width_m = 10.0e-6
y_area_m = 10.0e-6
